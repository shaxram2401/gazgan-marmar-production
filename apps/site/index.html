<!-- ABOUT -->
<section class="about" id="about">
  <div class="container">
    <div class="section-head reveal">
      <div>
        <span class="eyebrow">01 — About</span>
        <h2 class="section-title">A heritage<br>carved from <em>stone</em></h2>
      </div>
      <p class="lead">For over two decades, Gazgan district has been the heart of Uzbekistan’s marble industry — a unified platform of master entrepreneurs delivering world-class natural stone to global markets.</p>
    </div>
    <div class="about-grid">
      <div class="about-image reveal">
        <img src="https://images.unsplash.com/photo-1604147706283-d7119b5b822c?auto=format&fit=crop&w=1400&q=80" alt="Black marble interior" />
      </div>
      <div class="about-text reveal">
        <p>Gazgan Marmo represents a consolidated alliance of marble and granite producers from the Gazgan district — the most prolific natural stone region in Uzbekistan. Together, we transform raw geology into refined architectural material trusted by builders, designers, and developers worldwide.</p>
        <p>Our shared infrastructure spans modern extraction sites, precision processing facilities, and an export network that reaches more than twenty countries across Europe, the Middle East, and Asia.</p>
        <div class="about-features">
          <div class="feature">
            <div class="feature-num">01</div>
            <div class="feature-title">Production Capacity</div>
            <p class="feature-desc">Over 1,000 tons of premium stone processed monthly across modern facilities.</p>
          </div>
          <div class="feature">
            <div class="feature-num">02</div>
            <div class="feature-title">Export Strength</div>
            <p class="feature-desc">Direct export channels to 20+ countries with full logistics support.</p>
          </div>
          <div class="feature">
            <div class="feature-num">03</div>
            <div class="feature-title">Premium Quality</div>
            <p class="feature-desc">Each block individually inspected. Certified for international standards.</p>
          </div>
          <div class="feature">
            <div class="feature-num">04</div>
            <div class="feature-title">Trusted Alliance</div>
            <p class="feature-desc">Ten established entrepreneurs operating under unified standards.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
